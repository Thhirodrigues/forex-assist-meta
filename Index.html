<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Forex Assist v2.2.5</title>
<style>
:root{--bg:#0B1220;--card:#111827;--text:#E5E7EB;--muted:#9CA3AF;--green:#10B981;--red:#EF4444;--blue:#3B82F6}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
body{margin:0;background:var(--bg);color:var(--text);padding:16px}
h1{margin:0 0 6px;font-size:22px}
.status{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--red)}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
button{width:100%;padding:15px;border:0;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:16px;margin:8px 0}
.card{background:var(--card);padding:16px;border-radius:16px;margin:12px 0;border:1px solid #1F2937}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:8px 12px;border-radius:20px;background:#1F2937;color:var(--muted);cursor:pointer}
.pill.active{background:var(--blue);color:#fff}
.price{font-size:36px;font-weight:800;margin:8px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:12px;color:var(--muted)}
input{width:100%;padding:12px;border-radius:10px;border:1px solid #374151;background:#0F172A;color:#fff;font-size:16px}
.val{font-weight:700;font-size:18px}
small{color:var(--muted)}
</style>
</head>
<body>
<h1>Forex Assist v2.2.5</h1>
<div class="status"><div class="dot" id="d"></div><span id="s">iniciando</span></div>
<button id="u">ATUALIZAR AGORA</button>
<div class="card">
<div class="pills" id="p"></div>
<div style="margin-top:12px"><div id="pr" class="val">AUD/USD</div><div class="price" id="lv">--</div><small id="ft">--</small></div>
<div class="grid" style="margin-top:12px">
<div><label>ENTRADA XM (+2p)</label><div id="e" class="val">--</div></div>
<div><label>Spread</label><div class="val">2 pips</div></div>
<div><label>TP +7.5</label><div id="t" class="val" style="color:var(--green)">--</div></div>
<div><label>SL -12.5</label><div id="l" class="val" style="color:var(--red)">--</div></div>
</div>
</div>
<div class="card">
<input id="xm" type="number" step="0.00001" placeholder="Preço XM agora">
<button id="c" style="background:#059669">Calibrar</button>
<small>Offset: <span id="o">0.0</span> pips</small>
</div>
<script>
const P=[['AUDUSD','AUD','USD'],['EURUSD','EUR','USD'],['GBPUSD','GBP','USD'],['USDJPY','USD','JPY'],['USDCAD','USD','CAD']];
let i=0,off=parseFloat(localStorage.fxoff||0);document.getElementById('o').textContent=off.toFixed(1);
const pip=s=>s.includes('JPY')?0.01:0.0001, fmt=(v,s)=>s.includes('JPY')?v.toFixed(3):v.toFixed(5);
const set=(on,t)=>{document.getElementById('d').className='dot'+(on?' on':'');document.getElementById('s').textContent=t;};
async function fast(b,q){
 const pair=b+q;
 const urls=[
  `https://cdn.jsdelivr.net/gh/fawazahmed0/currency-api@1/latest/currencies/${b.toLowerCase()}/${q.toLowerCase()}.json`,
  `https://api.exchangerate.host/convert?from=${b}&to=${q}`,
  `https://api.frankfurter.app/latest?from=${b}&to=${q}`
 ];
 for(const u of urls){
  try{
   const r=await fetch(u,{cache:'no-store'});
   if(!r.ok) continue;
   const j=await r.json();
   if(j[q.toLowerCase()]) return {p:j[q.toLowerCase()],s:'CDN'};
   if(j.result) return {p:j.result,s:'Host'};
   if(j.rates&&j.rates[q]) return {p:j.rates[q],s:'ECB'};
  }catch(e){}
 }
 return null;
}
async function up(){
 set(false,'buscando...');
 const [sy,b,q]=P[i];document.getElementById('pr').textContent=sy.slice(0,3)+'/'+sy.slice(3);
 const d=await fast(b,q);
 if(!d){set(false,'erro');return;}
 set(true,'AO VIVO');
 const pp=pip(sy),lv=d.p,ent=lv+2*pp+off*pp;
 document.getElementById('lv').textContent=fmt(lv,sy);
 document.getElementById('ft').textContent=d.s+' • '+new Date().toLocaleTimeString('pt-BR');
 document.getElementById('e').textContent=fmt(ent,sy);
 document.getElementById('t').textContent=fmt(ent+7.5*pp,sy);
 document.getElementById('l').textContent=fmt(ent-12.5*pp,sy);
}
function build(){const c=document.getElementById('p');c.innerHTML='';P.forEach((x,ix)=>{const d=document.createElement('div');d.className='pill'+(ix===i?' active':'');d.textContent=x[0].slice(0,3)+'/'+x[0].slice(3);d.onclick=()=>{i=ix;build();up();};c.appendChild(d);});}
document.getElementById('u').onclick=up;
document.getElementById('c').onclick=()=>{const xm=parseFloat(document.getElementById('xm').value);const lv=parseFloat(document.getElementById('lv').textContent);if(!xm||!lv)return;const pp=pip(P[i][0]);off=(xm-lv)/pp-2;localStorage.fxoff=off;document.getElementById('o').textContent=off.toFixed(1);up();};
build();up();setInterval(up,30000);
</script>
</body>
</html>
