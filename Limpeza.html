<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Limpeza Xiaomi</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #333;
            padding: 20px;
            text-align: center;
        }
        h2 { color: #1d1d1f; margin-bottom: 25px; }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 15px auto;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-cache { background-color: #0071e3; }
        .btn-sites { background-color: #34c759; }
        .note {
            font-size: 13px;
            color: #86868b;
            margin-top: 30px;
            padding: 10px;
            background: #e8e8ed;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h2>Painel de Limpeza Rápida</h2>

    <a href="chrome://settings/clearBrowserData" class="btn btn-cache">Limpar Cache (Última Hora)</a>

    <a href="chrome://settings/content/all" class="btn btn-sites">Escolher Site da Lista</a>

    <div class="note">
        <strong>Nota do Android:</strong> Devido às regras de segurança, aplicativos externos (como WhatsApp/Instagram) não aceitam comandos por links. Para eles, use o método de pressionar o ícone na tela inicial.
    </div>

</body>
</html>
