<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Forex Assist v2.2.3</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1220">
<style>
:root{--bg:#0B1220;--card:#111827;--text:#E5E7EB;--muted:#9CA3AF;--green:#10B981;--red:#EF4444;--blue:#3B82F6}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
body{margin:0;background:var(--bg);color:var(--text);padding:16px}
h1{margin:0 0 4px;font-size:22px}
.status{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--red);animation:pulse 2s infinite}
.dot.on{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
button{width:100%;padding:14px;border:0;border-radius:12px;background:var(--blue);color:white;font-weight:600;font-size:16px;margin:8px 0}
.card{background:var(--card);padding:16px;border-radius:16px;margin:12px 0;box-shadow:0 4px 12px #0003}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:8px 12px;border-radius:20px;background:#1F2937;color:var(--muted);cursor:pointer}
.pill.active{background:var(--blue);color:white}
.price{font-size:32px;font-weight:700;margin:8px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:12px;color:var(--muted)}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #374151;background:#0F172A;color:white}
small{color:var(--muted)}
</style>
</head>
<body>
<h1>Forex Assist v2.2.3</h1>
<div class="status"><div class="dot" id="dot"></div><span id="statustext">PREÇO AO VIVO</span></div>
<button id="refresh">ATUALIZAR</button>

<div class="card">
<div class="pills" id="pairs"></div>
<div style="margin-top:12px">
<div><label>Par Ativo</label><div id="pairname" style="font-weight:600">AUD/USD</div></div>
<div class="price" id="live">--</div>
<small>Fonte: <span id="source">--</span> • <span id="time">--</span></small>
</div>
<div class="grid" style="margin-top:12px">
<div><label>ENTRADA XM</label><div id="entry" style="font-weight:600">--</div></div>
<div><label>Spread</label><div>+2 pips</div></div>
<div><label>TP +7.5</label><div id="tp" style="color:var(--green)">--</div></div>
<div><label>SL -12.5</label><div id="sl" style="color:var(--red)">--</div></div>
</div>
</div>

<div class="card">
<h3>Modo Calibração</h3>
<small>Digite o preço que vê na XM agora e clique Calibrar. Offset salvo no dia.</small>
<input id="xmprice" type="number" step="0.00001" placeholder="Ex: 0.64790">
<button id="calib" style="background:#059669">Calibrar</button>
<small>Offset atual: <span id="offset">0.0</span> pips</small>
</div>

<div class="card">
<h3>Validação Diária</h3>
<div id="valid"></div>
<button id="savev" style="background:#4B5563">SALVAR VALIDAÇÃO</button>
</div>

<script>
const PAIRS=[['AUDUSD','AUD','USD'],['EURUSD','EUR','USD'],['GBPUSD','GBP','USD'],['USDJPY','USD','JPY'],['USDCAD','USD','CAD']];
let active=0; let offset=parseFloat(localStorage.getItem('fx_offset')||'0');
document.getElementById('offset').textContent=offset.toFixed(1);

function pip(pair){return pair.includes('JPY')?0.01:0.0001}
function fmt(v,p){return p.includes('JPY')?v.toFixed(3):v.toFixed(5)}

function setStatus(on){document.getElementById('dot').classList.toggle('on',on);document.getElementById('statustext').textContent=on?'PREÇO AO VIVO':'sem conexão'}

async function fetchPrice(base,quote){
 const pair=base+quote;
 const urls=[
  `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://api.exchangerate.host/convert?from=${base}&to=${quote}`)}`,
  `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${pair}=X?interval=1m`)}`
 ];
 for(let i=0;i<urls.length;i++){
  try{
   const r=await fetch(urls[i],{cache:'no-store'});
   const t=await r.text();
   const j=JSON.parse(t);
   if(j.result) return {price:j.result,src:'ECB'};
   if(j.chart?.result?.[0]?.meta?.regularMarketPrice) return {price:j.chart.result[0].meta.regularMarketPrice,src:'Yahoo'};
  }catch(e){}
 }
 return null;
}

async function update(){
 setStatus(false);
 const [sym,b,q]=PAIRS[active];
 document.getElementById('pairname').textContent=sym.replace('USD','/USD').replace('JPY','/JPY').replace('CAD','/CAD');
 const data=await fetchPrice(b,q);
 if(!data){document.getElementById('live').textContent='--';document.getElementById('source').textContent='erro';return}
 setStatus(true);
 const live=data.price;
 const p=pip(sym);
 const entry=live + 2*p + offset*p;
 document.getElementById('live').textContent=fmt(live,sym);
 document.getElementById('source').textContent=data.src;
 document.getElementById('time').textContent=new Date().toLocaleTimeString('pt-BR');
 document.getElementById('entry').textContent=fmt(entry,sym);
 document.getElementById('tp').textContent=fmt(entry+7.5*p,sym);
 document.getElementById('sl').textContent=fmt(entry-12.5*p,sym);
}

function buildPairs(){
 const c=document.getElementById('pairs'); c.innerHTML='';
 PAIRS.forEach((p,i)=>{
  const d=document.createElement('div');d.className='pill'+(i===active?' active':'');d.textContent=p[0].replace('USD','/USD').replace('JPY','/JPY');d.onclick=()=>{active=i;buildPairs();update()};c.appendChild(d)
 })
}
function buildValid(){
 const v=document.getElementById('valid'); v.innerHTML='';
 PAIRS.forEach(p=>{
  const sym=p[0]; const saved=JSON.parse(localStorage.getItem('v_'+sym)||'{}');
  v.innerHTML+=`<div style="margin:8px 0;padding:8px;background:#0F172A;border-radius:8px"><b>${sym}</b><div class="grid" style="margin-top:6px"><select id="r_${sym}"><option>--</option><option>WIN</option><option>LOSS</option></select><input id="p_${sym}" placeholder="pips" type="number" step="0.1"></div><input id="o_${sym}" placeholder="observação" style="margin-top:6px"></div>`;
  setTimeout(()=>{document.getElementById('r_'+sym).value=saved.r||'--';document.getElementById('p_'+sym).value=saved.p||'';document.getElementById('o_'+sym).value=saved.o||''},0)
 })
}
document.getElementById('refresh').onclick=update;
document.getElementById('calib').onclick=()=>{
 const xm=parseFloat(document.getElementById('xmprice').value); if(!xm)return;
 const live=parseFloat(document.getElementById('live').textContent); if(!live)return;
 const [sym]=PAIRS[active]; const p=pip(sym);
 offset=(xm-live)/p -2; localStorage.setItem('fx_offset',offset); document.getElementById('offset').textContent=offset.toFixed(1); update();
}
document.getElementById('savev').onclick=()=>{
 PAIRS.forEach(p=>{const s=p[0]; localStorage.setItem('v_'+s,JSON.stringify({r:document.getElementById('r_'+s).value,p:document.getElementById('p_'+s).value,o:document.getElementById('o_'+s).value}))}); alert('Salvo')
}
buildPairs();buildValid();update();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script>
</body>
</html>
