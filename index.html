  function hasIOSBridge() {

      type: eventName,
      payload: payload || {},

  function onFrame() {

    frameCount++;

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Forex Assist v2.2.4</title>
<style>
:root{--bg:#0B1220;--card:#111827;--text:#E5E7EB;--muted:#9CA3AF;--green:#10B981;--red:#EF4444;--blue:#3B82F6}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
body{margin:0;background:var(--bg);color:var(--text);padding:16px;min-height:100vh}
h1{margin:0 0 6px;font-size:22px}
.status{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--red);transition:all .3s}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
button{width:100%;padding:15px;border:0;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:16px;margin:8px 0;cursor:pointer}
button:active{transform:scale(.98)}
.card{background:var(--card);padding:16px;border-radius:16px;margin:12px 0;border:1px solid #1F2937}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:8px 12px;border-radius:20px;background:#1F2937;color:var(--muted);cursor:pointer;font-size:14px;user-select:none}
.pill.active{background:var(--blue);color:#fff}
.price{font-size:34px;font-weight:800;margin:8px 0;letter-spacing:.5px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
input{width:100%;padding:12px;border-radius:10px;border:1px solid #374151;background:#0F172A;color:#fff;font-size:16px}
small{color:var(--muted)}
.val{font-weight:700;font-size:18px}
</style>
</head>
<body>
<h1>Forex Assist v2.2.4</h1>
<div class="status"><div class="dot" id="dot"></div><span id="stat">sem conexão</span></div>
<button id="btn">ATUALIZAR</button>

<div class="card">
<div class="pills" id="pairs"></div>
<div style="margin-top:14px">
<div><label>Par</label><div id="pair" class="val">AUD/USD</div></div>
<div class="price" id="live">--</div>
<small>Fonte: <span id="src">--</span> • <span id="tm">--</span></small>
</div>
<div class="grid" style="margin-top:14px">
<div><label>ENTRADA XM (+2p)</label><div id="ent" class="val">--</div></div>
<div><label>Spread</label><div class="val">2 pips</div></div>
<div><label>TP +7.5</label><div id="tp" class="val" style="color:var(--green)">--</div></div>
<div><label>SL -12.5</label><div id="sl" class="val" style="color:var(--red)">--</div></div>
</div>
</div>

<div class="card">
<h3 style="margin:0 0 8px;font-size:16px">Calibrar com XM</h3>
<input id="xm" type="number" step="0.00001" placeholder="Preço que vê na XM">
<button id="cal" style="background:#059669;margin-top:10px">Calibrar agora</button>
<small>Offset atual: <span id="off">0.0</span> pips</small>
</div>

<script>
const PAIRS=[['AUDUSD','AUD','USD'],['EURUSD','EUR','USD'],['GBPUSD','GBP','USD'],['USDJPY','USD','JPY'],['USDCAD','USD','CAD']];
let idx=0;
let offset=parseFloat(localStorage.getItem('fxoff')||'0');
document.getElementById('off').textContent=offset.toFixed(1);

const pip=s=>s.includes('JPY')?0.01:0.0001;
const fmt=(v,s)=>s.includes('JPY')?v.toFixed(3):v.toFixed(5);

function setStatus(on){
 document.getElementById('dot').className='dot'+(on?' on':'');
 document.getElementById('stat').textContent=on?'PREÇO AO VIVO':'sem conexão';
}

async function getPrice(base,quote){
 const pair=base+quote;
 const urls=[
  'https://api.allorigins.win/raw?url='+encodeURIComponent('https://api.frankfurter.app/latest?from='+base+'&to='+quote),
  'https://api.allorigins.win/raw?url='+encodeURIComponent('https://api.exchangerate.host/convert?from='+base+'&to='+quote)
 ];
 for(const u of urls){
  try{
   const r=await fetch(u,{cache:'no-store'});
   if(!r.ok) continue;
   const data=await r.json();
   if(data.rates && data.rates[quote]) return {p:data.rates[quote],s:'Frankfurter'};
   if(data.result) return {p:data.result,s:'ECB'};
  }catch(e){}
 }
 return null;
}

async function upd(){
 setStatus(false);
 const [sym,b,q]=PAIRS[idx];
 document.getElementById('pair').textContent=sym.slice(0,3)+'/'+sym.slice(3);
 document.getElementById('live').textContent='...';
 const d=await getPrice(b,q);
 if(!d){
  document.getElementById('live').textContent='--';
  document.getElementById('src').textContent='erro';
  return;
 }
 setStatus(true);
 const live=d.p;
 const pp=pip(sym);
 const ent=live + 2*pp + offset*pp;
 document.getElementById('live').textContent=fmt(live,sym);
 document.getElementById('src').textContent=d.s;
 document.getElementById('tm').textContent=new Date().toLocaleTimeString('pt-BR');
 document.getElementById('ent').textContent=fmt(ent,sym);
 document.getElementById('tp').textContent=fmt(ent+7.5*pp,sym);
 document.getElementById('sl').textContent=fmt(ent-12.5*pp,sym);
}

function build(){
 const c=document.getElementById('pairs');c.innerHTML='';
 PAIRS.forEach((p,i)=>{
  const d=document.createElement('div');
  d.className='pill'+(i===idx?' active':'');
  d.textContent=p[0].slice(0,3)+'/'+p[0].slice(3);
  d.onclick=()=>{idx=i;build();upd();};
  c.appendChild(d);
 });
}

document.getElementById('btn').onclick=upd;
document.getElementById('cal').onclick=()=>{
 const xm=parseFloat(document.getElementById('xm').value);
 if(!xm) return alert('Digite o preço da XM');
 const live=parseFloat(document.getElementById('live').textContent);
 if(!live) return alert('Atualize o preço primeiro');
 const sym=PAIRS[idx][0];
 const pp=pip(sym);
 offset=(xm-live)/pp - 2;
 localStorage.setItem('fxoff',offset);
 document.getElementById('off').textContent=offset.toFixed(1);
 upd();
 alert('Calibrado! Offset: '+offset.toFixed(1)+' pips');
};

build();
upd();
setInterval(upd,60000);
</script>
</body>
                              </html>
