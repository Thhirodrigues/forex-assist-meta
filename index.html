        tdKeyIndex=(tdKeyIndex+i)%keys.length;
        // garante ordem crescente
        const vals=d.values.reverse().map(v=>({datetime:v.datetime,open:+v.open,high:+v.high,low:+v.low,close:+v.close}));
        return{src:'TW',values:vals};
      }
      if(d && d.code===429){ continue; }
    }catch(e){ /* tenta próxima */ }
    await new Promise(r=>setTimeout(r,200)); // pequena pausa entre chaves
  }
  // se todas falharem, espera 30s para não travar
  backoffUntil=Date.now()+30000;
  addLog(`[${timeSP()}] Erro ${pair} (sem dados)`,'error');
  return null;
}

function processPair(pair,data){
  const v=data.values;
  const closes=v.map(x=>+x.close), highs=v.map(x=>+x.high||+x.close), lows=v.map(x=>+x.low||+x.close);
  if(closes.length<50)return;
  const e9=ema(closes,9), e21=ema(closes,21), e50=ema(closes,50);
  const rsiV=rsi(closes,14), adxV=adx(highs,lows,closes,14);
  const e12=ema(closes,12), e26=ema(closes,26);
  const macd=closes.map((_,i)=>e12[i]!=null&&e26[i]!=null?e12[i]-e26[i]:null);
  const signal=emaNull(macd,9);
  const last=closes.length-1;
  const rv=rsiV[last], av=adxV[last]||0;
  addLog(`[${timeSP()}] ${pair} ${data.src} | RSI ${rv?.toFixed(1)} ADX ${Math.round(av)}`);

  const e9l=e9[last],e21l=e21[last],e50l=e50[last],macdL=macd[last],sigL=signal[last];
  let buy=0,sell=0;
  if(e9l&&e21l&&e50l){if(e9l>e21l&&e21l>e50l)buy+=20;if(e9l<e21l&&e21l<e50l)sell+=20}
  if(rv){if(rv>=55&&rv<=65)buy+=20;if(rv>=35&&rv<=45)sell+=20}
  const adxThr=settings.mode==='conservador'?25:20; if(av>=adxThr){buy+=20;sell+=20}
  if(macdL!=null&&sigL!=null){if(macdL>sigL)buy+=20;if(macdL<sigL)sell+=20}
  if(last>=2){if(closes[last]>closes[last-1]&&closes[last-1]>closes[last-2])buy+=20;if(closes[last]<closes[last-1]&&closes[last-1]<closes[last-2])sell+=20}
  const thr=settings.mode==='conservador'?85:75;
  let dir=null,score=0;
  if(buy>=thr&&buy>sell){dir='BUY';score=buy}
  else if(sell>=thr&&sell>buy){dir='SELL';score=sell}
  if(dir){
    addLog(`[${timeSP()}] <span onclick="navigator.clipboard.writeText('${pair}');window.location.href='market://launch?id=com.xm.webapp'" style="cursor:pointer;text-decoration:underline">SINAL ${dir} ${pair} score ${score} → Abrir XM</span>`,'signal');
    trades.sinais++;localStorage.setItem(todayKey,JSON.stringify(trades));updateResumo();
    if(navigator.vibrate)navigator.vibrate([500,200,500,200,1000]);
    if(window.Notification&&Notification.permission==='granted'){
      try{const n=new Notification(`Forex Assist • ${pair} ${dir}`,{body:`Score ${score} • TP $${settings.tp} SL $${settings.sl} • Lote ${settings.lote} • Toque para XM`}); n.onclick=()=>{window.open('intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=com.xm.webapp;end','_blank')}}catch{}
    }
    // salva sinal aberto para rastrear TP/SL mesmo offline
    const entry = closes[last];
    const pip = pair.includes('JPY') ? 0.01 : 0.0001;
    const pipValue = settings.lote * 10 * (pair.includes('JPY') ? (100/entry) : 1);
    const pipsTP = settings.tp / pipValue;
    const pipsSL = settings.sl / pipValue;
    const tpPrice = dir==='BUY' ? entry + pipsTP*pip : entry - pipsTP*pip;
    const slPrice = dir==='BUY' ? entry - pipsSL*pip : entry + pipsSL*pip;
    const sig = {id: Date.now()+'_'+pair, pair, dir, entry, tpPrice, slPrice, time: Date.now(), timeStr: timeSP(), status:'open'};
    openSignals.push(sig); localStorage.setItem('fa_signals_open', JSON.stringify(openSignals));
  }
}

async function scanCycle(){
  if(scanning||!scannerActive)return;
  scanning=true;
  try{
    if(!inWindow()){return}
    if(Date.now()<backoffUntil)return;
    cycleCount++;
    const tier1=['EUR/USD','GBP/USD','USD/JPY','AUD/USD','USD/CAD'];
    for(const pair of settings.pairsActive){
      if(!scannerActive)break;
      const isTier1=tier1.includes(pair);
      const shouldScan=isTier1 || (cycleCount%3===0);
      if(!shouldScan)continue;
      const data=await getData(pair);
      if(data)processPair(pair,data);
      await new Promise(r=>setTimeout(r,700));
    }
  }finally{scanning=false}
}

async function startScanner(){
  if(scannerActive)return;
  scannerActive=true;setActive(true);
  $('#btnScanner').textContent='PARAR SCANNER';$('#btnScanner').className='btn btn-red';
  addLog(`[${timeSP()}] Scanner iniciado`);
  try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');console.log('Wake Lock ativo');addLog(`[${timeSP()}] Wake Lock ativo`);wakeLock.addEventListener('release',()=>console.log('Wake Lock liberado'))}}catch{}
  scanCycle();
  clearInterval(scannerInterval);
  scannerInterval=setInterval(()=>{scanCycle(); if(cycleCount%2===0) processOpenSignals();},Math.max(10,settings.delay)*1000);
}
function stopScanner(){
  scannerActive=false;setActive(false);
  $('#btnScanner').textContent='INICIAR SCANNER';$('#btnScanner').className='btn btn-green';
  clearInterval(scannerInterval);
  if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null}
  addLog(`[${timeSP()}] Scanner parado`);
}

function openSettings(){
  $('#twKey').value=settings.twKey;$('#twKey2').value=settings.twKey2;$('#twKey3').value=settings.twKey3;$('#avKey').value=settings.avKey;$('#mode').value=settings.mode;$('#delay').value=settings.delay;$('#lote').value=settings.lote;$('#tp').value=settings.tp;$('#sl').value=settings.sl;
  document.querySelectorAll('#pairsGrid input').forEach(cb=>cb.checked=settings.pairsActive.includes(cb.dataset.pair));
  $('#settingsModal').classList.add('show');
}
function saveSettings(){
  settings.twKey=$('#twKey').value.trim()||settings.twKey;
  settings.twKey2=$('#twKey2').value.trim()||settings.twKey2;
  settings.twKey3=$('#twKey3').value.trim()||settings.twKey3;
  settings.avKey=$('#avKey').value.trim();
  settings.mode=$('#mode').value;
  settings.delay=Math.max(10,parseInt($('#delay').value)||25);
  settings.lote=parseFloat($('#lote').value)||0.04;
  settings.tp=parseInt($('#tp').value)||5;
  settings.sl=parseInt($('#sl').value)||5;
  settings.pairsActive=[...document.querySelectorAll('#pairsGrid input:checked')].map(i=>i.dataset.pair);
  if(settings.pairsActive.length===0)settings.pairsActive=['EUR/USD'];
  saveSettingsLS();updateInfoLine();updatePairsUI();$('#settingsModal').classList.remove('show');
  addLog(`[${timeSP()}] Configurações salvas`);
  if(scannerActive){clearInterval(scannerInterval);scannerInterval=setInterval(scanCycle,settings.delay*1000)}
}
async function requestNotif(){
  if(!('Notification' in window))return alert('Notificações não suportadas');
  const p=await Notification.requestPermission(); addLog(`[${timeSP()}] Permissão notificação: ${p}`);
  if(p==='granted'){addLog(`[${timeSP()}] Notificações ativadas`);$('#btnNotify').textContent='NOTIFICAÇÕES ATIVAS';$('#btnNotify').disabled=true}
}


async function processOpenSignals(){
  if(!openSignals.length) return;
  // evita travar: processa só o mais antigo por vez
  const s = openSignals[0];
  const key = settings.twKey || settings.twKey2 || settings.twKey3;
  if(!key || !s.tpPrice) { openSignals.shift(); localStorage.setItem('fa_signals_open', JSON.stringify(openSignals)); return; }
  try{
    const start = new Date(s.time).toISOString().replace('T',' ').substring(0,19);
    const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(s.pair)}&interval=1min&start_date=${start}&outputsize=500&apikey=${key}`;
    const r = await fetch(url); const j = await r.json();
    if(!j.values) return;
    const candles = j.values.reverse();
    for(const c of candles){
      const h=parseFloat(c.high), l=parseFloat(c.low);
      const hora = c.datetime.split(' ')[1].substring(0,5);
      if(s.dir==='BUY'){
        if(h>=s.tpPrice){ addLog(`[${hora}] RESULTADO ${s.dir} ${s.pair} WIN +$${settings.tp} (sinal ${s.timeStr})`,'success'); trades.tp++; openSignals.shift(); break; }
        if(l<=s.slPrice){ addLog(`[${hora}] RESULTADO ${s.dir} ${s.pair} LOSS -$${settings.sl} (sinal ${s.timeStr})`,'error'); trades.sl++; openSignals.shift(); break; }
      }else{
        if(l<=s.tpPrice){ addLog(`[${hora}] RESULTADO ${s.dir} ${s.pair} WIN +$${settings.tp} (sinal ${s.timeStr})`,'success'); trades.tp++; openSignals.shift(); break; }
        if(h>=s.slPrice){ addLog(`[${hora}] RESULTADO ${s.dir} ${s.pair} LOSS -$${settings.sl} (sinal ${s.timeStr})`,'error'); trades.sl++; openSignals.shift(); break; }
      }
    }
    localStorage.setItem(todayKey, JSON.stringify(trades)); updateResumo();
  }catch(e){}
  localStorage.setItem('fa_signals_open', JSON.stringify(openSignals));
}

function init(){
  const clearBtn=document.getElementById('clearSignals');
  if(clearBtn) clearBtn.onclick=()=>{localStorage.removeItem('fa_signals_open');openSignals=[];addLog(`[${timeSP()}] Sinais pendentes limpos`,'info');alert('Sinais pendentes apagados');};

  settings=loadSettings();
  trades=JSON.parse(localStorage.getItem(todayKey)||'{"sinais":0,"tp":0,"sl":0}');
  openSignals=JSON.parse(localStorage.getItem('fa_signals_open')||'[]');
  logEntries=JSON.parse(localStorage.getItem('fa_log_v435')||'[]');
  updateInfoLine();updatePairsUI();updateResumo();renderLog();
  setTimeout(processOpenSignals,3000);
  $('#btnSettings').onclick=openSettings;
  $('#closeSettings').onclick=()=>$('#settingsModal').classList.remove('show');
  $('#saveSettings').onclick=saveSettings;
  $('#btnNotify').onclick=requestNotif;
  $('#btnScanner').onclick=()=>scannerActive?stopScanner():startScanner();
  $('#clearLog').onclick=()=>{logEntries=[];localStorage.removeItem('fa_log_v435');$('#log').innerHTML=''};
  if('Notification' in window && Notification.permission==='granted'){$('#btnNotify').textContent='NOTIFICAÇÕES ATIVAS';$('#btnNotify').disabled=true}
  $('#settingsModal').addEventListener('click',e=>{if(e.target.id==='settingsModal')e.currentTarget.classList.remove('show')});
  document.addEventListener('visibilitychange',async()=>{if(scannerActive&&document.visibilityState==='visible'&&'wakeLock' in navigator&&!wakeLock){try{wakeLock=await navigator.wakeLock.request('screen')}catch{}}});
  if('serviceWorker' in navigator){const code=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>{});self.addEventListener('fetch',e=>{})`;const blob=new Blob([code],{type:'text/javascript'});navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{})}
  addLog(`[${timeSP()}] Forex Assist v4.4h pronto`);
}
document.addEventListener('DOMContentLoaded',init);
</script>
