  if (window.playablesSDK) return;

  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);

    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }

        eventName,
        JSON.stringify(p)

    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }

    errorSent = true;

      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,

    complete: function(score) {

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false

      sendEvent(eventName, payload);

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Forex Assist OFFLINE v3.0</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#0B1220;--card:#111827;--text:#E5E7EB;--muted:#9CA3AF;--green:#10B981;--red:#EF4444;--blue:#3B82F6}
*{box-sizing:border-box;font-family:system-ui,Arial}
body{margin:0;background:var(--bg);color:var(--text);padding:16px}
h1{margin:0 0 4px;font-size:24px}
small{color:var(--muted)}
.card{background:var(--card);padding:18px;border-radius:16px;margin:14px 0;border:1px solid #1f2937}
input{width:100%;padding:16px;font-size:22px;border-radius:12px;border:1px solid #374151;background:#0F172A;color:#fff;text-align:center;font-weight:700}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.pill{padding:10px 14px;border-radius:20px;background:#1f2937;cursor:pointer}
.pill.active{background:var(--blue)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.val{font-size:24px;font-weight:800}
.label{font-size:12px;color:var(--muted)}
button{width:100%;padding:16px;background:var(--blue);border:0;border-radius:12px;color:#fff;font-weight:700;font-size:18px;margin-top:12px}
</style>
</head>
<body>
<h1>Forex Assist v3.0</h1>
<small>OFFLINE • 100% instantâneo • XM</small>

<div class="card">
<div class="pills" id="pairs"></div>
<label class="label">Preço ATUAL na XM</label>
<input id="px" type="number" step="0.00001" placeholder="ex: 0.64850" inputmode="decimal">
<button onclick="calc()">CALCULAR AGORA</button>
</div>

<div class="card">
<div class="grid">
<div><div class="label">PAR</div><div class="val" id="par">AUD/USD</div></div>
<div><div class="label">SPREAD</div><div class="val">2 pips</div></div>
<div><div class="label">ENTRADA (+2p)</div><div class="val" id="ent">--</div></div>
<div><div class="label">HORA</div><div class="val" id="hr" style="font-size:18px">--:--</div></div>
<div><div class="label">TP +7.5</div><div class="val" id="tp" style="color:var(--green)">--</div></div>
<div><div class="label">SL -12.5</div><div class="val" id="sl" style="color:var(--red)">--</div></div>
</div>
</div>

<script>
const PAIRS=['AUD/USD','EUR/USD','GBP/USD','USD/JPY','USDCAD'];
let idx=0;
const pip=s=>s.includes('JPY')?0.01:0.0001;
const fmt=(v,s)=>s.includes('JPY')?v.toFixed(3):v.toFixed(5);
function build(){
 const c=document.getElementById('pairs');c.innerHTML='';
 PAIRS.forEach((p,i)=>{const d=document.createElement('div');d.className='pill'+(i===idx?' active':'');d.textContent=p;d.onclick=()=>{idx=i;document.getElementById('par').textContent=p;calc();};c.appendChild(d);});
}
function calc(){
 const p=document.getElementById('px').value.replace(',','.');
 const price=parseFloat(p);
 if(!price){alert('Digite o preço da XM');return;}
 const pair=PAIRS[idx];
 const pp=pip(pair);
 const ent=price+2*pp;
 document.getElementById('ent').textContent=fmt(ent,pair);
 document.getElementById('tp').textContent=fmt(ent+7.5*pp,pair);
 document.getElementById('sl').textContent=fmt(ent-12.5*pp,pair);
 document.getElementById('hr').textContent=new Date().toLocaleTimeString('pt-BR').slice(0,5);
 document.getElementById('par').textContent=pair;
}
build();
document.getElementById('px').addEventListener('keydown',e=>{if(e.key==='Enter')calc();});
</script>
</body>
</html>
