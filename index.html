<meta charset="UTF-8">

<title>Forex Assist v4.3 - Real Money</title>

<style>
body{font-family:system-ui,Arial;margin:0;padding:16px;background:#0b1220;color:#e5e7eb}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:14px;margin-bottom:12px}
button{width:100%;padding:14px;margin:6px 0;border:0;border-radius:10px;font-weight:700;font-size:16px}
.primary{background:#2563eb;color:#fff}
.warn{background:#dc2626;color:#fff}
.muted{color:#9ca3af;font-size:13px}
.log{height:220px;overflow:auto;background:#0a0f1c;border-radius:8px;padding:8px;font-family:monospace;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;margin-left:6px}
.ok{background:#065f46;color:#a7f3d0}
.off{background:#7f1d1d;color:#fecaca}
.gear{font-size:20px;background:none;border:0;color:#9ca3af;cursor:pointer}

label{display:block;margin:8px 0 4px;font-size:13px;color:#d1d5db}
input,select{width:100%;padding:9px;border-radius:8px;border:1px solid #374151;background:#0b1220;color:#e5e7eb}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

<body>
<h1 style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
  <div style="font-size:22px;line-height:1.2;flex:1">
    Forex Assist v4.3 - Real Money
    <img src="icon-32.png" style="height:26px;width:26px;border-radius:6px;vertical-align:middle;margin-left:4px;position:relative;top:-2px">
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:2px">
    <span id="status" class="badge off">DESATIVADO</span>
    <button class="gear" onclick="abrirCfg()">⚙️</button>
  </div>
</h1>

<div class="card">
  <button class="primary" onclick="ativar()">ATIVAR NOTIFICAÇÕES</button>
  <button class="warn" onclick="iniciar()">INICIAR SCANNER</button>
  <div class="muted">Horários: <span id="hshow"></span> • Lote <span id="lshow"></span> • TP/SL <span id="tpshow"></span> pips</div>
</div>

<div class="card">
  <div><b>Resumo do dia</b></div>
  <div class="summary" id="resumo"><div>Sinais: 0</div><div>TP: 0</div><div>SL: 0</div><div>Acerto: 0%</div></div>
</div>

<div class="card">
  <div><b>Pares ativos</b> <span class="muted" id="paresInfo"></span></div>
  <div class="muted">Filtros: EMA9>21>50 • RSI 55-65/35-45 • MACD • ADX>22 • 2 candles • delay 14s • Dual API</div>
</div>

<div class="card">
  <div><b>Log</b></div>
  <div id="log" class="log"></div>
</div>

<div class="modal" id="cfg">
<div class="box">
<h3>Configurações</h3>
<label>API Key TwelveData (principal)</label>
<input id="cfgTwelve" placeholder="sua chave twelvedata">
<label>API Key Alpha Vantage (backup)</label>
<input id="cfgKey" placeholder="U2MTIJ03KGNL5K7T">
<label>Lote</label>
<select id="cfg_lote"><option>0.01</option><option>0.02</option><option>0.04</option><option>0.05</option></select>
<div class="grid"><div><label>TP pips</label><input id="cfg_tp" type="number" value="5"></div><div><label>SL pips</label><input id="cfg_sl" type="number" value="5"></div></div>
<label>Horário manhã</label><input id="cfg_m1" value="08:30"> - <input id="cfg_m2" value="10:30">
<label>Horário tarde</label><input id="cfg_t1" value="14:30"> - <input id="cfg_t2" value="16:30">
<label>Modo</label><select id="cfg_modo"><option value="75">Normal (score>75)</option><option value="85">Conservador (>85)</option><option value="65">Agressivo (>65)</option></select>
<label>Pares (marque)</label><div id="cfg_pares" style="max-height:160px;overflow:auto;font-size:13px"></div>
<div style="display:flex;gap:8px;margin-top:12px"><button class="primary" onclick="salvarCfg()">Salvar</button><button onclick="fecharCfg()" style="background:#374151;color:#fff;border:0;padding:10px;border-radius:8px;flex:1">Fechar</button></div>
</div></div>

<script>
const PARES_ALL = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","USD/CHF","NZD/USD","EUR/GBP","EUR/JPY","GBP/JPY","EUR/AUD","GBP/AUD","AUD/JPY","AUD/CAD"];
let CFG = JSON.parse(localStorage.getItem('forex_cfg_v433')||'{}');
CFG.twelve = CFG.twelve || '0921a69006c6481baf8170d3ff7d97e6';
CFG.apikey = CFG.apikey || 'U2MTIJ03KGNL5K7T';
CFG.lote = CFG.lote || "0.04"; CFG.tp=CFG.tp||5; CFG.sl=CFG.sl||5;
CFG.m1=CFG.m1||"08:30"; CFG.m2=CFG.m2||"10:30"; CFG.t1=CFG.t1||"14:30"; CFG.t2=CFG.t2||"16:30";
CFG.modo=CFG.modo||75; CFG.pares=CFG.pares||PARES_ALL.slice(0,7);

let ativo=false, timer=null, swReg=null, trades=JSON.parse(localStorage.getItem('forex_trades_'+new Date().toISOString().slice(0,10))||'[]');

function log(m){const el=document.getElementById('log');el.innerHTML+=`[${new Date().toLocaleTimeString()}] ${m}<br>`;el.scrollTop=el.scrollHeight}
function vibrar(){if(navigator.vibrate) navigator.vibrate([1000,500,1000,500,1000])}
async function notificar(t,b){try{if(swReg) await swReg.showNotification(t,{body:b,icon:"icon-192.png",vibrate:[1000,500,1000,500,1000],requireInteraction:true});}catch(e){}}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(r=>{swReg=r;log("SW registrado")})}

function atualizaUI(){document.getElementById('hshow').textContent=CFG.m1+"-"+CFG.m2+" e "+CFG.t1+"-"+CFG.t2; document.getElementById('lshow').textContent=CFG.lote; document.getElementById('tpshow').textContent=CFG.tp; document.getElementById('paresInfo').textContent=CFG.pares.length+" pares"; atualizaResumo()}
function atualizaResumo(){const tp=trades.filter(t=>t.result==='TP').length; const sl=trades.filter(t=>t.result==='SL').length; const tot=trades.length; const ac=tot?Math.round(tp/tot*100):0; document.getElementById('resumo').innerHTML=`<div>Sinais: ${tot}</div><div>TP: ${tp}</div><div>SL: ${sl}</div><div>Acerto: ${ac}%</div>`; localStorage.setItem('forex_trades_'+new Date().toISOString().slice(0,10), JSON.stringify(trades))}
atualizaUI();

function abrirCfg(){document.getElementById('cfg').style.display='flex'; document.getElementById('cfgTwelve').value=CFG.twelve; document.getElementById('cfgKey').value=CFG.apikey; document.getElementById('cfg_lote').value=CFG.lote; document.getElementById('cfg_tp').value=CFG.tp; document.getElementById('cfg_sl').value=CFG.sl; document.getElementById('cfg_m1').value=CFG.m1; document.getElementById('cfg_m2').value=CFG.m2; document.getElementById('cfg_t1').value=CFG.t1; document.getElementById('cfg_t2').value=CFG.t2; document.getElementById('cfg_modo').value=CFG.modo; const div=document.getElementById('cfg_pares'); div.innerHTML=''; PARES_ALL.forEach(p=>{const id='p_'+p.replace('/',''); div.innerHTML+=`<label><input type="checkbox" id="${id}" ${CFG.pares.includes(p)?'checked':''}> ${p}</label><br>`})}
function fecharCfg(){document.getElementById('cfg').style.display='none'}
function salvarCfg(){CFG.twelve=document.getElementById('cfgTwelve').value.trim(); CFG.apikey=document.getElementById('cfgKey').value.trim(); CFG.lote=document.getElementById('cfg_lote').value; CFG.tp=+document.getElementById('cfg_tp').value; CFG.sl=+document.getElementById('cfg_sl').value; CFG.m1=document.getElementById('cfg_m1').value; CFG.m2=document.getElementById('cfg_m2').value; CFG.t1=document.getElementById('cfg_t1').value; CFG.t2=document.getElementById('cfg_t2').value; CFG.modo=+document.getElementById('cfg_modo').value; CFG.pares=PARES_ALL.filter(p=>document.getElementById('p_'+p.replace('/','')).checked); localStorage.setItem('forex_cfg_v433',JSON.stringify(CFG)); atualizaUI(); fecharCfg(); log("Config salva - TW:"+CFG.twelve.slice(0,4)+"...")}

async function ativar(){const p=await Notification.requestPermission();if(p==="granted"){ativo=true;document.getElementById('status').textContent="ATIVO";document.getElementById('status').className="badge ok";vibrar();await notificar("Forex Assist","Pronto - Dual API");log("Ativo")}}

function emJanela(){const d=new Date();const m=d.getHours()*60+d.getMinutes();const toM=s=>+s.split(':')[0]*60+ +s.split(':')[1]; return (m>=toM(CFG.m1)&&m<=toM(CFG.m2))||(m>=toM(CFG.t1)&&m<=toM(CFG.t2))}
function ema(a,p){const k=2/(p+1);let e=a[0];for(let i=1;i<a.length;i++)e=a[i]*k+e*(1-k);return e}
function rsi(c){let g=0,l=0;for(let i=1;i<=14;i++){const d=c[i]-c[i-1];if(d>0)g+=d;else l-=d}const rs=g/(l||1);return 100-100/(1+rs)}
function adx(h,l,c,p=14){let tr=[],dmP=[],dmN=[];for(let i=1;i<c.length;i++){const th=Math.max(h[i],c[i-1]), tl=Math.min(l[i],c[i-1]); tr.push(th-tl); const up=h[i]-h[i-1], dn=l[i-1]-l[i]; dmP.push(up>dn&&up>0?up:0); dmN.push(dn>up&&dn>0?dn:0)} const atr=ema(tr.slice(-p*2),p); const dp=ema(dmP.slice(-p*2),p)*100/(atr||1); const dn=ema(dmN.slice(-p*2),p)*100/(atr||1); const dx=Math.abs(dp-dn)/(dp+dn||1)*100; return dx}

async function buscar(par){
  // 1) TwelveData
  try{
    const url=`https://api.twelvedata.com/time_series?symbol=${par}&interval=1min&outputsize=100&apikey=${CFG.twelve}`;
    const r=await fetch(url); const j=await r.json();
    if(j && j.values && j.values.length>60){
      const vals=j.values.reverse();
      const candles=vals.map(v=>({o:+v.open,h:+v.high,l:+v.low,c:+v.close}));
      return {candles, src:'TW'};
    }
  }catch(e){}
  // 2) Alpha fallback
  try{
    const [f,t]=par.split('/');
    const url=`https://www.alphavantage.co/query?function=FX_INTRADAY&from_symbol=${f}&to_symbol=${t}&interval=1min&apikey=${CFG.apikey}&outputsize=compact`;
    const r=await fetch(url); const j=await r.json(); const ts=j["Time Series FX (1min)"];
    if(ts){ const ks=Object.keys(ts).reverse(); const candles=ks.map(k=>({o:+ts[k]["1. open"],h:+ts[k]["2. high"],l:+ts[k]["3. low"],c:+ts[k]["4. close"]})); return {candles, src:'AV'}; }
  }catch(e){}
  return null;
}

async function analisar(){
 if(!ativo) return;
 if(!emJanela()){log("Fora da janela");return}
 let melhor=null;
 for(const p of CFG.pares){
  try{
   const d=await buscar(p); if(!d||d.candles.length<60){log(`Erro ${p} (TW+AV)`); await new Promise(r=>setTimeout(r,14000)); continue}
   const c=d.candles.map(x=>x.c); const h=d.candles.map(x=>x.h); const l=d.candles.map(x=>x.l);
   const e9=ema(c.slice(-20),9), e21=ema(c.slice(-30),21), e50=ema(c.slice(-55),50);
   const r=rsi(c.slice(-15)); const macd=ema(c.slice(-26),12)-ema(c.slice(-26),26); const adxV=adx(h,l,c);
   const buy=e9>e21&&e21>e50&&c.at(-1)>e9&&r>=55&&r<=65&&macd>0&&adxV>22;
   const sell=e9<e21&&e21<e50&&c.at(-1)<e9&&r>=35&&r<=45&&macd<0&&adxV>22;
   const conf2 = (c.at(-1)>c.at(-2)) === (c.at(-2)>c.at(-3));
   if((buy||sell)&&conf2){ const dir=buy?"BUY":"SELL"; const score=Math.min(100,Math.round(50+Math.abs(e9-e21)*10000 + Math.abs(macd*5000) + (adxV-22))); if(!melhor||score>melhor.score) melhor={par:p,dir,price:c.at(-1),score,r,src:d.src};}
   log(`${p} ${d.src} | RSI ${r.toFixed(1)} ADX ${adxV.toFixed(0)}`); await new Promise(r=>setTimeout(r,14000));
  }catch(e){log(`Erro ${p}`); await new Promise(r=>setTimeout(r,14000))}
 }
 if(melhor && melhor.score>=CFG.modo){
   const tp=(melhor.dir==="BUY"?melhor.price+CFG.tp*0.0001:melhor.price-CFG.tp*0.0001).toFixed(5);
   const sl=(melhor.dir==="BUY"?melhor.price-CFG.sl*0.0001:melhor.price+CFG.sl*0.0001).toFixed(5);
   vibrar(); await notificar(`${melhor.dir} ${melhor.par} • ${melhor.src}`,`Entrada ${melhor.price.toFixed(5)} • Score ${melhor.score} • TP ${tp} SL ${sl}`);
   trades.push({par:melhor.par,dir:melhor.dir,entry:melhor.price,tp:+tp,sl:+sl,time:Date.now(),result:null,src:melhor.src}); atualizaResumo(); log(`SINAL ${melhor.dir} ${melhor.par} ${melhor.src} score ${melhor.score}`);
 } else { log("Sem oportunidade no ciclo") }
 // checa TP/SL
 for(const t of trades.filter(x=>!x.result)){try{const d=await buscar(t.par); if(!d) continue; const pr=d.candles.at(-1).c; if((t.dir==="BUY"&&pr>=t.tp)||(t.dir==="SELL"&&pr<=t.tp)){t.result="TP"; vibrar(); await notificar(`TP ${t.par}`,"Fechou no alvo")} else if((t.dir==="BUY"&&pr<=t.sl)||(t.dir==="SELL"&&pr>=t.sl)){t.result="SL"; vibrar(); await notificar(`SL ${t.par}`,"Fechou no stop")} }catch{}} atualizaResumo();
}

function iniciar(){if(!ativo){alert("Ative primeiro");return}if(timer)clearInterval(timer);log("Scanner iniciado - Dual API");analisar();timer=setInterval(analisar, 1000*60*4)}
</script>
</body>
