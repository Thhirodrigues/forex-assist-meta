<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forex Assist v3.2.1</title>
<style>:root{--bg:#0B1220;--c:#121C2F;--b:#1F2A44;--t:#E6EDF7;--m:#8B9BB4}body{margin:0;background:var(--bg);color:var(--t);font-family:system-ui;padding:0}header{padding:18px;text-align:center;font-weight:800;border-bottom:1px solid var(--b);position:sticky;top:0;background:rgba(11,18,32,.8);backdrop-filter:blur(8px)}main{max-width:480px;margin:0 auto;padding:16px}.card{background:var(--c);border:1px solid var(--b);border-radius:16px;padding:14px;margin:12px 0}button{background:#3B82F6;color:#fff;border:0;padding:12px 16px;border-radius:10px;font-weight:700;margin-right:8px}button.green{background:#10B981}button.red{background:#EF4444}.ok{color:#10B981}.muted{color:var(--m);font-size:13px}#log{max-height:200px;overflow:auto;font-family:monospace;font-size:12px}</style>
</head><body>
<header>FOREX ASSIST <span style="color:#3B82F6">v3.2.1</span></header>
<main>
<div class="card"><div id="push">Push: DESATIVADO</div><div class="muted">Horário: 8:30-10:30 e 14:30-16:30</div><div style="margin-top:10px"><button id="perm">ATIVAR NOTIFICAÇÕES</button><button id="test" class="green">TESTAR</button><button id="run">ESCANEAR</button></div></div>
<div class="card"><b>Como usar agora:</b><div class="muted">1. Clique ATIVAR (você já fez) 2. Clique TESTAR para sentir a vibração 3. No horário, clique ESCANEAR e deixe aberto. Quando achar BUY/SELL, vibra e notifica.</div></div>
<div class="card"><b>Log</b><div id="log"></div></div>
</main>
<script>
const API_KEY='R2G4BTFYRDDUB4DK';
const SYMBOLS=['EUR/USD','GBP/USD','USD/JPY','AUD/USD','USD/CAD','USD/CHF'];
const state={running:false,last:{}};
const $=s=>document.querySelector(s);
const fmt=n=>Number(n).toFixed(5);
function log(m){$('#log').innerHTML=`<div>${new Date().toLocaleTimeString()} - ${m}</div>`+$('#log').innerHTML}
async function fetchData(sym){
  const fx=sym.replace('/','');
  const url=`https://www.alphavantage.co/query?function=FX_INTRADAY&from_symbol=${sym.split('/')[0]}&to_symbol=${sym.split('/')[1]}&interval=1min&outputsize=compact&apikey=${API_KEY}`;
  const r=await fetch(url); const j=await r.json(); const series=j[Object.keys(j).find(k=>k.includes('Time Series'))]; if(!series) throw 'sem dados';
  const times=Object.keys(series).sort().reverse(); const c=times.slice(0,60).map(t=>parseFloat(series[t]['4. close'])).reverse();
  return {price:c[c.length-1],c};
}
function ema(arr,p){const k=2/(p+1);let e=arr[0];const out=[e];for(let i=1;i<arr.length;i++){e=arr[i]*k+e*(1-k);out.push(e)}return out}
function rsi(arr,14){let g=0,l=0;for(let i=1;i<=14;i++){const d=arr[i]-arr[i-1];if(d>0)g+=d;else l-=d}let ag=g/14,al=l/14;const out=[];for(let i=15;i<arr.length;i++){const d=arr[i]-arr[i-1];ag=(ag*13+(d>0?d:0))/14;al=(al*13+(d<0?-d:0))/14;out.push(100-100/(1+ag/(al||1e-9)))}return out}
function inWindow(){const h=new Date().getHours(),m=new Date().getMinutes(),t=h*60+m;return(t>=510&&t<=630)||(t>=870&&t<=990)}
function notify(sym,dir,price){
  if(Notification.permission==='granted'){
    navigator.vibrate&&navigator.vibrate([1000,500,1000,500,1000]);
    new Notification(`${sym} ${dir}`,{body:`Entrada ${fmt(price)} | TP ${fmt(dir==='BUY'?price+0.0005:price-0.0005)}`,tag:'forex'});
  }
}
async function scan(){
  if(!inWindow()){log('Fora do horário');return}
  for(const s of SYMBOLS){
    try{
      const {price,c}=await fetchData(s); if(c.length<50) continue;
      const e9=ema(c,9),e21=ema(c,21),r=rsi(c,14); const last=c.length-1;
      const up=e9[last]>e21[last]&&c[last]>e9[last]&&r[r.length-1]>50&&r[r.length-1]<70;
      const dn=e9[last]<e21[last]&&c[last]<e9[last]&&r[r.length-1]<50&&r[r.length-1]>30;
      const dir=up?'BUY':dn?'SELL':null;
      if(dir && state.last[s]!==dir){state.last[s]=dir; notify(s,dir,price); log(`${s} ${dir} @ ${fmt(price)}`);}
    }catch(e){log(s+' erro')}
    await new Promise(r=>setTimeout(r,12000));
  }
}
function toggle(){
  state.running=!state.running; $('#run').textContent=state.running?'PARAR':'ESCANEAR';
  if(state.running){scan(); state.iv=setInterval(scan,60000)} else clearInterval(state.iv);
}
window.onload=()=>{
  $('#run').onclick=toggle;
  $('#test').onclick=()=>notify('EUR/USD','BUY',1.12345);
  $('#perm').onclick=async()=>{const p=await Notification.requestPermission();$('#push').textContent='Push: '+p.toUpperCase();$('#push').className=p==='granted'?'ok':''};
  if(Notification.permission==='granted'){$('#push').textContent='Push: ATIVO';$('#push').className='ok'}
}
</script>
</body></html>
